<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Tracker - Roadmap</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f7;color:#1a1a1a}
    .header{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 24px;display:flex;align-items:center;gap:24px}
    .header h1{font-size:18px;font-weight:600;padding:16px 0}
    .header a{font-size:13px;color:#888;text-decoration:none;margin-left:auto}
    .header a:hover{color:#1a1a1a}
    .content{max-width:720px;margin:0 auto;padding:28px 24px}
    .phase{margin-bottom:32px}
    .phase-title{font-size:16px;font-weight:600;margin-bottom:4px}
    .phase-desc{font-size:12px;color:#888;margin-bottom:14px}
    .item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border:1px solid #e5e5e5;border-radius:8px;margin-bottom:8px}
    .item-name{flex:1;font-size:14px}
    .item-status{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500}
    .status-done{background:#e8f5e9;color:#27ae60}
    .status-active{background:#e3f2fd;color:#1976d2}
    .status-soon{background:#fff8e1;color:#f39c12}
    .status-planned{background:#f0f0f0;color:#888}
    .vote-btn{border:1px solid #ddd;background:#fafafa;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:4px;color:#555}
    .vote-btn:hover{border-color:#999;background:#fff}
    .vote-btn.voted{border-color:#1976d2;color:#1976d2;background:#e3f2fd}
    .vote-count{font-weight:600;min-width:16px;text-align:center}
  </style>
</head>
<body>
<div class="header">
  <h1>Roadmap</h1>
  <a href="index.html">&larr; Back to dashboard</a>
</div>
<div class="content" id="roadmap"></div>
<script>
var SB_URL = localStorage.getItem("sb_url") || "";
var SB_KEY = localStorage.getItem("sb_key") || "";
var PHASES = [
  {title:"Phase 1 \u2014 Foundation",desc:"Core features \u2014 all shipped",items:[
    {id:"p1-dashboard",name:"Dashboard with Results, Watchlist, Settings tabs",status:"done"},
    {id:"p1-run-btn",name:"Run search now button with GitHub PAT",status:"done"},
    {id:"p1-email",name:"Email alerts managed from Settings",status:"done"},
    {id:"p1-scrapers",name:"Chessex + Dice Shop scrapers",status:"done"},
    {id:"p1-edit",name:"Watchlist item edit button",status:"done"}
  ]},
  {title:"Phase 2 \u2014 Data & sources",desc:"More data sources and richer product info",items:[
    {id:"p2-ebay-api",name:"eBay official API",status:"active"},
    {id:"p2-url-watcher",name:"URL watcher \u2014 paste any product URL to track",status:"soon"},
    {id:"p2-search-indicator",name:"Header search indicator with pulsing dot",status:"soon"},
    {id:"p2-sparkline",name:"Price history sparkline on each product",status:"soon"}
  ]},
  {title:"Phase 3 \u2014 Analytics",desc:"Price intelligence and stock tracking",items:[
    {id:"p3-price-change",name:"Price change indicator vs 7 days ago",status:"planned"},
    {id:"p3-target-price",name:"Price drop email alerts with target price",status:"planned"},
    {id:"p3-stock-history",name:"Stock availability history percentage",status:"planned"},
    {id:"p3-best-price",name:"Best price comparison across sources",status:"planned"}
  ]},
  {title:"Phase 4 \u2014 Website integration",desc:"Connect to mahjbox.com for staff sourcing",items:[
    {id:"p4-sourcing-page",name:"Mahj Box staff sourcing page on mahjbox.com",status:"planned"},
    {id:"p4-curation",name:"Save / Skip curation buttons on products",status:"planned"},
    {id:"p4-squarespace",name:"Squarespace embed component",status:"planned"},
    {id:"p4-trends",name:"Seasonal price trend analysis",status:"planned"}
  ]}
];
var statusLabels={done:"Done",active:"Active",soon:"Soon",planned:"Planned"};
var statusClasses={done:"status-done",active:"status-active",soon:"status-soon",planned:"status-planned"};

async function loadVotes(){
  var votes={};
  if(SB_URL&&SB_KEY){try{
    var r=await fetch(SB_URL+"/rest/v1/roadmap_votes?select=*",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    var data=await r.json();
    if(Array.isArray(data))data.forEach(function(row){votes[row.id]=row.votes||0;});
  }catch(e){}}
  return votes;
}

async function castVote(itemId){
  var sk="roadmap_voted_"+itemId;
  if(localStorage.getItem(sk))return;
  if(SB_URL&&SB_KEY){try{
    var r=await fetch(SB_URL+"/rest/v1/roadmap_votes?id=eq."+itemId+"&select=votes",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    var data=await r.json();
    var cur=(data&&data[0])?data[0].votes:0;
    await fetch(SB_URL+"/rest/v1/roadmap_votes",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},body:JSON.stringify({id:itemId,votes:cur+1})});
  }catch(e){}}
  localStorage.setItem(sk,"1");
  doRender();
}

async function doRender(){
  var votes=await loadVotes();
  var c=document.getElementById("roadmap");
  c.innerHTML="";
  PHASES.forEach(function(phase){
    var s=document.createElement("div");s.className="phase";
    var t=document.createElement("div");t.className="phase-title";t.textContent=phase.title;s.appendChild(t);
    var d=document.createElement("div");d.className="phase-desc";d.textContent=phase.desc;s.appendChild(d);
    phase.items.forEach(function(item){
      var row=document.createElement("div");row.className="item";
      var nm=document.createElement("div");nm.className="item-name";nm.textContent=item.name;
      var st=document.createElement("span");st.className="item-status "+(statusClasses[item.status]||"status-planned");st.textContent=statusLabels[item.status]||item.status;
      var vb=document.createElement("button");vb.className="vote-btn";
      var voted=!!localStorage.getItem("roadmap_voted_"+item.id);
      if(voted)vb.classList.add("voted");
      var cs=document.createElement("span");cs.className="vote-count";cs.textContent=votes[item.id]||0;
      vb.appendChild(cs);vb.appendChild(document.createTextNode(voted?" \u2714":" \u25B2"));
      if(!voted)vb.addEventListener("click",function(){castVote(item.id);});
      row.appendChild(nm);row.appendChild(st);row.appendChild(vb);s.appendChild(row);
    });
    c.appendChild(s);
  });
}
doRender();
</script>
</body>
</html>
